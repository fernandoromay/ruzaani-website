# lurk.example.yaml
# -----------------------------------------------------------------------------
# Lurk Framework Deployment Configuration
#
# This file defines how your application is packaged and deployed.
# You MUST copy this to 'lurk.yaml' and configure it for your project.
# -----------------------------------------------------------------------------

project: <your-project-name>

# Build configuration for the target environment
build:
  target: x86_64-linux
  optimize: true

# Deployment provider configuration
# Choose one of the following providers:
#   provider: ssh     # Simple rsync + ssh restart
#   provider: docker  # Build/push OCI image
#   provider: shell   # Execute custom local shell script
# -----------------------------------------------------------------------------
deploy:
  provider: ssh # <--- Change to ssh | docker | shell

  # Configuration settings specific to the chosen provider:
  config:
    # --- OPTION 1: SSH Provider (Classic VPS) ---
    host: "<vps-ip-or-hostname>"
    user: "<server-username>"
    path: "/var/www/my-app"
    service_name: "lurk-website"
    activate_cmd: "sudo systemctl restart lurk-website"

    # --- OPTION 2: Docker Provider (Containerized) ---
    # registry: "docker.io/myuser/my-app"
    # dockerfile: "./Dockerfile"
    # tag: "latest"

    # --- OPTION 3: Shell/Custom Provider (Manual Script) ---
    # script: "./scripts/deploy-custom.sh"
    # env:
    #   DEPLOY_ENV: "production"
