build:
  optimize: true
  target: x86_64-linux
deploy:
  config:
    activate_cmd: sudo systemctl restart ruzaani-website
    host: ${VPS_IP}
    path: /var/www/ruzaani/website
    service_name: ruzaani-website
    user: ${VPS_USER}
  env_vars:
    ADMIN_EMAIL: ADMIN_EMAIL
    SMTP_HOST: SMTP_HOST
    SMTP_PASS: SMTP_PASS
    SMTP_PORT: SMTP_PORT
    SMTP_SECR: SMTP_SECR
    SMTP_USER: SMTP_USER
  provider: ssh
project: ruzaani-website
